<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://kit.fontawesome.com/749b88acba.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <script src="script.js"></script>
    <div class="main-container">
        <div class="row">
            <div id="input_field" class="col-md-4">
                <h2>Task Manager</h2>
                <p>All inputs must be filled</p>
                <input type="text" id="task">
                <input type="date" id="datetxt">
                <p>Select Priority:</p>
                <input type="radio" id="priority-high" name="priority" value="high">
                <label for="priority-high">High</label>
                <input type="radio" id="priority-low" name="priority" value="low">
                <label for="priority-low">Low</label>
                <button onclick="addtask()" id="submit_btn">Add Task</button>
            </div>

            <div id="output_field" class="col-md-8">

                <table id="table">
                    <tr>
                        <th>Status</th>
                        <th>Tasks</th>
                        <th>Priority</th>
                        <th>Due Date</th>
                        <th>Actions</th>
                    </tr>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
